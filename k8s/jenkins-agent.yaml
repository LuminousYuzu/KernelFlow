# CPU-only Jenkins agent pod spec for hybrid pipeline architecture.
#
# This pod runs the Build / Static Analysis / Test / Deploy stages.
# The Benchmark stage runs on a separate WSL2 host agent (with GPU access
# via Docker Desktop's --gpus all) — see Jenkinsfile and docs/development-log.md
# for the rationale (Issues 8/9/10).
#
# To re-enable GPU pods on native Linux: add the nvidia.com/gpu resource
# requests/limits below and the matching toleration. The kernel/test code
# is unchanged.

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: kernelflow-agent
spec:
  restartPolicy: Never

  containers:
    # ------------------------------------------------------------------
    # Primary build container — runs Build / Static Analysis / Test / Deploy
    # No GPU on this pod. GPU stages run on the wsl-host Jenkins agent.
    # ------------------------------------------------------------------
    - name: cuda-build
      image: docker.io/library/kernelflow-build:latest   # built from ./Dockerfile; loaded into minikube
      imagePullPolicy: Never                              # image is pre-loaded, not from a registry

      command: ["cat"]
      tty: true

      resources:
        limits:
          memory: "8Gi"
          cpu: "4"
        requests:
          memory: "4Gi"
          cpu: "2"

      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: registry-cache
          mountPath: /registry          # wheel output → local registry

    # ------------------------------------------------------------------
    # JNLP sidecar — Jenkins agent communication
    # ------------------------------------------------------------------
    - name: jnlp
      image: jenkins/inbound-agent:latest
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"

  volumes:
    - name: workspace
      emptyDir: {}
    - name: registry-cache
      hostPath:
        path: /opt/kernelflow/registry   # local wheel registry on the GPU PC
        type: DirectoryOrCreate
