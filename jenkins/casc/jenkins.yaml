# Jenkins Configuration as Code (JCasC)
#
# Jenkins reads this file at startup (CASC_JENKINS_CONFIG env var).
# All ${VAR} references are injected from docker-compose environment.
#
# To reload without restarting Jenkins:
#   Manage Jenkins → Configuration as Code → Reload existing configuration

jenkins:
  systemMessage: "KernelFlow — Automated CUDA Kernel CI/CD"
  numExecutors: 0            # controller runs no jobs; all work goes to K8s pods

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          name: "KernelFlow Admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # ---------------------------------------------------------------------------
  # Kubernetes cloud — points at the local minikube cluster
  # ---------------------------------------------------------------------------
  clouds:
    - kubernetes:
        name: "minikube"
        serverUrl: "${MINIKUBE_API_URL}"    # e.g. https://127.0.0.1:PORT (from setup.sh)
        namespace: "default"

        # Jenkins URL as seen FROM inside the minikube pod
        # The pod must be able to reach the Jenkins controller over the LAN
        jenkinsUrl: "http://${PC_LAN_IP}:8080"
        jenkinsTunnel: "${PC_LAN_IP}:50000"

        credentialsId: "minikube-sa-token"
        skipTlsVerify: true    # minikube uses a self-signed cert
        connectTimeout: 60
        readTimeout: 60

        # Default pod template — used for any agent that doesn't specify one
        # The Jenkinsfile overrides this with k8s/jenkins-agent.yaml
        templates:
          - name: "default"
            namespace: "default"
            label: "k8s"
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                alwaysPullImage: false

# ---------------------------------------------------------------------------
# Credentials store
# ---------------------------------------------------------------------------
credentials:
  system:
    domainCredentials:
      - credentials:
          # Kubernetes service account token (created by setup.sh)
          - string:
              id: "minikube-sa-token"
              secret: "${MINIKUBE_SA_TOKEN}"
              description: "minikube Jenkins service account token"

          # GitHub personal access token (repo + webhook scopes)
          - string:
              id: "GITHUB_TOKEN"
              secret: "${GITHUB_TOKEN}"
              description: "GitHub PAT — repo read + webhook write"

          # Weights & Biases upload key
          - string:
              id: "WANDB_API_KEY"
              secret: "${WANDB_API_KEY}"
              description: "wandb API key for benchmark result upload"

# ---------------------------------------------------------------------------
# Global tool configuration
# ---------------------------------------------------------------------------
tool:
  git:
    installations:
      - name: "Default"
        home: "git"

# Pipeline job is created manually via the UI after first boot.
# See: New Item → Multibranch Pipeline → kernelflow
